name: openenv-code-review-workflows
version: 2.0.0
description: Production-style code review environment with deterministic staged workflows and per-step rewards.
entrypoint: env.environment.CodeReviewEnv
reward_range: [0.0, 1.0]

tasks:
  - id: easy
    difficulty: easy
    objective: Identify a syntax bug in a production incident ticket and provide a direct safe fix.
    required_stages: [identify_bug]
    dataset: data/easy_cases.json
  - id: medium
    difficulty: medium
    objective: Review style/maintainability issues and propose a non-breaking refactor plan.
    required_stages: [identify_style_issues, propose_refactor]
    dataset: data/medium_cases.json
  - id: hard
    difficulty: hard
    objective: Execute a full incident review workflow including risk triage, fix planning, and test planning.
    required_stages: [triage_risks, propose_fix_plan, define_test_plan]
    dataset: data/hard_cases.json

action_space:
  model: env.models.Action
  fields:
    task_id: [easy, medium, hard]
    action_type: string
    payload: string
    confidence: float[0.0,1.0]

observation_space:
  model: env.models.Observation
  fields:
    task_id: string
    difficulty: string
    objective: string
    ticket: object
    available_actions: list[string]
    required_stages: list[string]
    completed_stages: list[string]
    step_count: int
    remaining_steps: int
    history: list[object]

schemas:
  action:
    type: env.models.Action
    format: pydantic
  observation:
    type: env.models.Observation
    format: pydantic
  reward:
    type: env.models.Reward
    format: pydantic

deployment:
  dockerfile: Dockerfile
  api_entrypoint: api/app.py

inference:
  script: inference.py

